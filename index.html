<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ 向心門市 Barista 拉花大賽</title>
    
    <style>
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: #faf7f2; 
            color: #4b3621;
            text-align: center; 
            padding: 20px; 
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #3d2b1f;
            border-bottom: 2px dashed #d7ccc8;
            display: inline-block;
            padding-bottom: 10px;
            margin-top: 20px;
        }

        #user-status { font-weight: bold; color: #6f4e37; margin-bottom: 20px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 30px auto; 
        }

        .card { 
            background: white; 
            border-radius: 15px; 
            padding: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            border: 1px solid #e0d7d1;
            transition: transform 0.3s;
            position: relative;
            z-index: 2;
        }

        .card:hover { transform: translateY(-5px); }

        .latte-img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        .name { font-size: 1.2rem; font-weight: bold; margin: 10px 0; color: #6f4e37; }
        .count { font-size: 1.8rem; color: #e67e22; font-weight: bold; margin-bottom: 5px; }

        .vote-btn { 
            background: #1e3932; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold;
            font-size: 1rem;
        }

        .vote-btn:hover { background: #00704a; }
        .vote-btn:disabled { background: #ccc; cursor: not-allowed; }

        .reset-btn { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb; 
            padding: 8px 15px; 
            margin-top: 50px; 
            cursor: pointer; 
            font-size: 12px; 
            border-radius: 5px; 
        }

        /* ✨ 漂浮裝飾邏輯：使用 Emoji，保證 100% 跑得出來 */
        .deco {
            position: fixed;
            font-size: 50px;
            z-index: 1;
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
            pointer-events: none;
        }

        .deco-left { bottom: 30px; left: 20px; }
        .deco-right { bottom: 30px; right: 20px; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @media (max-width: 600px) {
            .deco { font-size: 35px; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjpsK4vZPeLuIHnaWq9yZyEfkM2yb2iOM",
            authDomain: "shuuu-87761.firebaseapp.com",
            databaseURL: "https://shuuu-87761-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "shuuu-87761",
            storageBucket: "shuuu-87761.firebasestorage.app",
            messagingSenderId: "445720361109",
            appId: "1:445720361109:web:d20e41886276afe272c39c",
            measurementId: "G-JMG4Z11KHF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const votesRef = ref(db, 'votes');

        const partners = [
            { id: 1, name: "Sharon", img: "https://cdn.phototourl.com/free/2026-03-31-4c843b34-fb56-4085-a97f-1d8db99c63ad.jpg" },
            { id: 2, name: "Heather", img: "https://cdn.phototourl.com/free/2026-04-05-a9bcdd29-cfe8-4529-b907-4f2aa3f4139f.jpg" },
            { id: 3, name: "JOY", img: "https://cdn.phototourl.com/free/2026-04-05-b178daff-d413-4787-98bd-8a3a6f9bb7db.jpg" },
            { id: 4, name: "BIBI", img: "https://cdn.phototourl.com/free/2026-04-05-5813455f-864f-4ab5-8528-362f1e201329.jpg" },
            { id: 5, name: "BREEZE", img: "https://cdn.phototourl.com/free/2026-04-05-5548258c-944e-4012-9c10-5707b58392be.jpg" },
            { id: 6, name: "RYAN", img: "https://cdn.phototourl.com/free/2026-04-05-515207e2-10cc-4af7-8ed8-89c4d0577dc2.jpg" },
            { id: 7, name: "ALLEN", img: "https://cdn.phototourl.com/free/2026-04-05-bcdcce6f-dfe9-4d62-a3de-d7fd8a2c0615.jpg" },
            { id: 8, name: "IRENE", img: "https://cdn.phototourl.com/free/2026-04-05-953ebbfb-18fd-4084-9e59-ac3c7a48d313.jpg" },
            { id: 9, name: "ROXANNE", img: "https://cdn.phototourl.com/free/2026-04-05-f48751a5-fc2a-4ca1-a1f7-5f0aa96a504a.jpg" },
            { id: 10, name: "LIVIA", img: "https://cdn.phototourl.com/free/2026-04-05-69ea8429-e33b-472c-9cd6-1c06f6c35fd8.jpg" },
        ];

        let votes = {};
        const VOTE_LIMIT = 3;
        let myVotes = parseInt(localStorage.getItem('shulatte_votes')) || 0;

        onValue(votesRef, (snapshot) => {
            votes = snapshot.val() || {};
            // ✨ 歸零連動邏輯
            if (Object.keys(votes).length === 0) {
                myVotes = 0;
                localStorage.removeItem('shulatte_votes');
            }
            render();
        });

        function render() {
            const grid = document.getElementById('main-grid');
            const status = document.getElementById('user-status');
            const remaining = Math.max(0, VOTE_LIMIT - myVotes);
            status.innerText = remaining > 0 ? `您本週還有 ${remaining} 票可以投！` : "您本週的 3 票已投完，感謝支持！";

            grid.innerHTML = partners.map(p => {
                const isMaxed = myVotes >= VOTE_LIMIT;
                return `
                    <div class="card">
                        <img src="${p.img}" class="latte-img">
                        <div class="name">${p.name}</div>
                        <div class="count">${votes[p.id] || 0} 票</div>
                        <button class="vote-btn" ${isMaxed ? 'disabled' : ''} onclick="window.vote(${p.id})">
                            ${isMaxed ? '票數已滿' : '投給這杯拉花'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        window.vote = (id) => {
            if (myVotes < VOTE_LIMIT) {
                const currentVote = (votes[id] || 0) + 1;
                set(ref(db, 'votes/' + id), currentVote);
                myVotes++;
                localStorage.setItem('shulatte_votes', myVotes);
                render();
            }
        };

        window.resetVotes = () => {
            const adminPassword = "20030323"; 
            if (prompt("管理員密碼：") === adminPassword) {
                if (confirm("確定要將全體票數歸零嗎？")) {
                    remove(votesRef)
                        .then(() => {
                            localStorage.removeItem('shulatte_votes');
                            alert("已全數歸零！祝下週比賽順利 ☕");
                            location.reload();
                        })
                        .catch(err => alert("歸零失敗：" + err));
                }
            } else {
                alert("密碼錯誤！");
            }
        };
    </script>
</head>
<body>
    <h1>☕ 向心門市本週拉花 PK 賽</h1>
    <div id="user-status">載入中...</div>
    
    <div class="grid" id="main-grid"></div>

    <div class="deco deco-left">☕</div>
    <div class="deco deco-right">🫘</div>

    <button class="reset-btn" onclick="window.resetVotes()">⚙️ 管理員歸零 (新的一週開始)</button>
</body>
</html>
