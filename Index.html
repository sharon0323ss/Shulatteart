<!DOCTYPE html>
<html>
<head>
    <title>Shulatteart</title>
    <script>
        function checkPassword() {
            var password = prompt('Enter password for admin reset:');
            if (password !== 'your_password') {
                alert('Incorrect password!');
                return false;
            }
            return true;
        }
    </script>
</head>
<body>

    <button onclick="if(checkPassword()){ /* Admin reset logic */ }">Reset Admin</button>
</body>
